name: Debug call_records
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node _debug_calls.mjs
        env:
          IF_SUPABASE_URL: ${{ secrets.IF_SUPABASE_URL }}
          IF_SUPABASE_KEY: ${{ secrets.IF_SUPABASE_KEY }}
