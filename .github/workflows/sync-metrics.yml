name: Sync Metrics Cache

on:
  schedule:
    - cron: '7,37 * * * *'   # cada 30 min offset 7min (evita pisar */15 dashboard principal)
  workflow_dispatch:           # disparar manualmente si se necesita

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. Sync llamadas primero (overlap 2h, rápido) para que las métricas las vean frescas
      - name: Sync calls GHL → Supabase
        env:
          GHL_TOKEN_IF:    ${{ secrets.GHL_TOKEN_IF }}
          IF_SUPABASE_URL: ${{ secrets.IF_SUPABASE_URL }}
          IF_SUPABASE_KEY: ${{ secrets.IF_SUPABASE_KEY }}
        run: node _sync_calls.mjs

      # 2. Computar métricas con llamadas ya actualizadas
      - name: Sync metrics → Supabase cache
        env:
          GHL_TOKEN_IF:    ${{ secrets.GHL_TOKEN_IF }}
          IF_SUPABASE_URL: ${{ secrets.IF_SUPABASE_URL }}
          IF_SUPABASE_KEY: ${{ secrets.IF_SUPABASE_KEY }}
        run: node _sync_metrics.mjs
