name: Daily Analytics Email Report

on:
  schedule:
    - cron: '0 13 * * *'   # 9 AM Chile (UTC-4) lun-dom
  workflow_dispatch:
    inputs:
      to:
        description: 'Email destinatario (opcional)'
        required: false
        default: 'esteban@happydebt.com'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install nodemailer
      - name: Enviar reporte diario
        env:
          IF_SUPABASE_URL:   ${{ secrets.IF_SUPABASE_URL }}
          IF_SUPABASE_KEY:   ${{ secrets.IF_SUPABASE_KEY }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          REPORT_TO:         ${{ github.event.inputs.to || 'esteban@happydebt.com' }}
        run: node _send_daily_report.mjs
