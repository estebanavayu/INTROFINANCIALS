name: Audit Metrics
on: workflow_dispatch
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run audit
        env:
          GHL_TOKEN_IF:    ${{ secrets.GHL_TOKEN_IF }}
          IF_SUPABASE_URL: ${{ secrets.IF_SUPABASE_URL }}
          IF_SUPABASE_KEY: ${{ secrets.IF_SUPABASE_KEY }}
        run: node _audit_metrics.mjs
