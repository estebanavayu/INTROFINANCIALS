name: Sync Call Records

on:
  workflow_dispatch:  # solo manual — sync-calls ahora corre integrado en sync-metrics cada 30 min

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync calls GHL → Supabase
        env:
          GHL_TOKEN:       ${{ secrets.GHL_TOKEN_IF }}
          IF_SUPABASE_URL: ${{ secrets.IF_SUPABASE_URL }}
          IF_SUPABASE_KEY: ${{ secrets.IF_SUPABASE_KEY }}
        run: node _sync_calls.mjs
        working-directory: .
