name: Sync Call Records

on:
  schedule:
    - cron: '20 6 * * *'   # 6:20 AM UTC = 2:20 AM Chile (offset vs sync-metrics :07/:37)
    - cron: '20 17 * * *'  # 17:20 UTC = 1:20 PM Chile
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync calls GHL → Supabase
        env:
          GHL_TOKEN:       ${{ secrets.GHL_TOKEN_IF }}
          IF_SUPABASE_URL: ${{ secrets.IF_SUPABASE_URL }}
          IF_SUPABASE_KEY: ${{ secrets.IF_SUPABASE_KEY }}
        run: node _sync_calls.mjs
        working-directory: .
